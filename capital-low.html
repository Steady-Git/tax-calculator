<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>저가양도 등 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #4f7fff;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --accent4: #06d6a0;
    --text: #e8eaf6;
    --text2: #8b8fa8;
    --red: #ff4d6d;
    --green: #2ecc71;
    --yellow: #ffd166;
    --blue: #4f7fff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 32px 16px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #4f7fff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .header p {
    color: var(--text2);
    font-size: 13px;
  }

  .main {
    max-width: 1400px;
    margin: 0 auto;
  }

  /* 입력 패널 */
  .input-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 32px;
  }

  .input-panel h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  .input-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    align-items: end;
  }

  .input-group label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 8px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .input-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .input-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,127,255,0.15);
  }

  .input-group input.highlight-시가 { border-color: var(--yellow); }
  .input-group input.highlight-대가 { border-color: var(--accent); }

  .calc-btn {
    background: linear-gradient(135deg, #4f7fff, #7c5af5);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 13px 28px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .calc-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .calc-btn:active { transform: translateY(0); }

  /* 섹션 탭 */
  .scenario-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* 결과 그리드 */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 20px;
  }

  .scenario-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .scenario-card:hover { border-color: #4f7fff55; }

  .card-header {
    padding: 16px 20px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .card-header h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }

  .badge-low { background: rgba(79,127,255,0.15); color: var(--blue); }
  .badge-high { background: rgba(255,77,109,0.15); color: var(--red); }
  .badge-gift { background: rgba(255,209,102,0.15); color: var(--yellow); }
  .badge-ok { background: rgba(46,204,113,0.15); color: var(--green); }

  .card-body { padding: 20px; }

  /* 세금 섹션별 */
  .tax-section {
    margin-bottom: 18px;
  }

  .tax-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tax-section-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 12px;
    border-radius: 2px;
  }

  .상증세법 .tax-section-title::before { background: var(--yellow); }
  .소득세법 .tax-section-title::before { background: var(--accent); }
  .취득세법 .tax-section-title::before { background: var(--accent4); }

  .tax-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }

  .tax-row:last-child { border-bottom: none; }

  .tax-label { color: var(--text2); }

  .tax-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
  }

  .tax-highlight {
    font-size: 14px;
    font-weight: 600;
    color: var(--yellow);
  }

  .result-tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
    margin-top: 6px;
  }

  .tag-있음 { background: rgba(255,107,107,0.15); color: #ff6b6b; }
  .tag-없음 { background: rgba(46,204,113,0.15); color: var(--green); }
  .tag-아님 { background: rgba(46,204,113,0.15); color: var(--green); }
  .tag-적용 { background: rgba(255,107,107,0.15); color: #ff6b6b; }
  .tag-해당없음 { background: rgba(139,143,168,0.15); color: var(--text2); }

  .divider {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 14px 0;
  }

  /* 주의 메시지 */
  .notice {
    background: rgba(255,209,102,0.07);
    border: 1px solid rgba(255,209,102,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--yellow);
    margin-top: 12px;
    line-height: 1.6;
  }

  /* 요약 바 */
  .summary-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .summary-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
  }

  .summary-chip span { color: var(--text2); margin-right: 6px; }
  .summary-chip strong { font-family: 'DM Mono', monospace; font-size: 13px; }

  .empty-state {
    text-align: center;
    color: var(--text2);
    padding: 60px;
    font-size: 14px;
  }

  .empty-state .icon {
    font-size: 40px;
    margin-bottom: 12px;
  }

  @media (max-width: 700px) {
    .input-grid { grid-template-columns: 1fr 1fr; }
    .results-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="main">
  <div class="header">
    <h1>저가양도 등 세금 계산기</h1>
    <p>시가와 대가를 입력하면 저가/고가양도 시 발생하는 상증세·소득세·취득세를 자동 계산합니다</p>
  </div>

  <!-- 입력 -->
  <div class="input-panel">
    <h2>입력값</h2>
    <div class="input-grid">
      <div class="input-group">
        <label>시가 (원)</label>
        <input type="text" id="시가" placeholder="1,150,000,000" class="highlight-시가" oninput="formatInput(this)">
      </div>
      <div class="input-group">
        <label>대가 (양도가액, 원)</label>
        <input type="text" id="대가" placeholder="800,000,000" class="highlight-대가" oninput="formatInput(this)">
      </div>
      <div class="input-group">
        <label>증여재산가액 (있는 경우, 원)</label>
        <input type="text" id="증여재산가액" placeholder="0" oninput="formatInput(this)">
      </div>
      <div style="display:flex; align-items:flex-end;">
        <button class="calc-btn" onclick="calculate()">계산하기</button>
      </div>
    </div>
  </div>

  <!-- 결과 -->
  <div id="결과영역">
    <div class="empty-state">
      <div class="icon">📊</div>
      <div>시가와 대가를 입력하고 계산하기를 눌러주세요</div>
    </div>
  </div>
</div>

<script>
function formatInput(el) {
  let v = el.value.replace(/[^0-9]/g, '');
  if (v) el.value = Number(v).toLocaleString('ko-KR');
  else el.value = '';
}

function parseVal(id) {
  const v = document.getElementById(id).value.replace(/[^0-9]/g, '');
  return v ? Number(v) : 0;
}

function fmt(n) {
  if (n === null || n === undefined) return '-';
  return Math.round(n).toLocaleString('ko-KR') + '원';
}

// 핵심 계산 로직
function calcAll(시가, 대가, 증여재산가액입력) {
  const 차액 = 시가 - 대가; // 양: 저가양도, 음: 고가양도
  const 시가30pct = 시가 * 0.3;
  const 삼억 = 300000000;
  const MIN기준 = Math.min(시가30pct, 삼억);

  // ── 특수관계인 여부에 따른 4가지 시나리오 ──
  // 1) 특수O 저가양도, 2) 특수X 저가양도, 3) 특수O 고가양도, 4) 특수X 고가양도

  const scenarios = [];

  // ====== 저가양도 케이스 ======
  if (차액 >= 0) {
    // 시나리오 1: 특수관계인O 저가양도 (양도인 기준 ← 증여 과세)
    {
      const 유형 = '저가양도';
      const 특수 = true;

      // 상증세법 - 양도인: 증여세 과세여부 및 증여재산가액
      const 증여재산가액 = 증여재산가액입력 > 0
        ? 증여재산가액입력
        : Math.max(차액 - MIN기준, 0); // MAX(시가-대가-MIN(시가30%,3억), 0)
      const 증여세과세여부 = 증여재산가액 > 0 ? '있음' : '없음';

      // 소득세법 - 양도인: 양도세 취득가액
      // 취득가액 = 대가 (실제 수령액)
      const 양도세취득가액 = 대가;

      // 소득세법 - 양수인: 양도세 부가세 적용여부 및 양도가액
      // 양수인이 나중에 팔 때 양도가액은 시가 기준 조정
      const 양수인양도부가세적용 = true; // 특수관계인 저가취득이므로 적용
      const 양수인양도가액 = 시가; // 시가를 취득가액으로 봄

      // 취득세법 - 취득세 과세표준
      const 취득세과표 = 시가; // 시가로 과세
      const 취득세유상취득분 = 취득세과표 * 0.04; // 참고용
      const 취득세무상취득분 = 증여재산가액 * 0.035; // 참고용

      scenarios.push({
        id: 1, 유형, 특수,
        label: '특수관계인 O — 저가양도',
        badge: 'low',
        시가, 대가, 차액, 증여재산가액, 증여세과세여부,
        양도세취득가액, 양수인양도부가세적용, 양수인양도가액,
        취득세과표,
        시가30pct, MIN기준,
      });
    }

    // 시나리오 2: 특수관계인X 저가양도
    {
      // 상증세: MIN(시가-대가, MIN(시가30%,3억)) → 여기서 차액이 MIN기준 이하면 증여 없음
      const 증여재산가액 = 증여재산가액입력 > 0
        ? 증여재산가액입력
        : (차액 > MIN기준 ? 차액 - MIN기준 : 0);
      const 증여세과세여부 = 증여재산가액 > 0 ? '있음' : '없음';

      // 비특수관계인이라도 증여세는 동일 구조, 단 양도세 취득가액은 실제 대가
      const 양도세취득가액 = 대가;

      scenarios.push({
        id: 2,
        유형: '저가양도', 특수: false,
        label: '특수관계인 X — 저가양도',
        badge: 'low',
        시가, 대가, 차액, 증여재산가액, 증여세과세여부,
        양도세취득가액,
        양수인양도부가세적용: false,
        양수인양도가액: 대가,
        취득세과표: 대가,
        시가30pct, MIN기준,
      });
    }
  }

  // ====== 고가양도 케이스 ======
  if (차액 <= 0) {
    const 고가차액 = 대가 - 시가; // 양수

    // 시나리오 3: 특수관계인O 고가양도
    {
      const 증여재산가액 = Math.max(고가차액 - MIN기준, 0);
      const 증여세과세여부 = 증여재산가액 > 0 ? '있음' : '없음';

      const 양도가액 = 시가; // 부당행위계산 적용 → 시가로 양도가액 조정
      const 양수인부가세적용 = true;
      const 취득세과표 = 시가;

      scenarios.push({
        id: 3,
        유형: '고가양도', 특수: true,
        label: '특수관계인 O — 고가양도',
        badge: 'high',
        시가, 대가, 차액: 고가차액, 증여재산가액, 증여세과세여부,
        양도세취득가액: 대가,
        양수인양도부가세적용: true,
        양수인양도가액: 양도가액,
        취득세과표,
        시가30pct, MIN기준,
        isHigh: true,
      });
    }

    // 시나리오 4: 특수관계인X 고가양도
    {
      const 증여재산가액 = 고가차액 > MIN기준 ? 고가차액 - MIN기준 : 0;
      const 증여세과세여부 = 증여재산가액 > 0 ? '있음' : '없음';

      scenarios.push({
        id: 4,
        유형: '고가양도', 특수: false,
        label: '특수관계인 X — 고가양도',
        badge: 'high',
        시가, 대가, 차액: 고가차액, 증여재산가액, 증여세과세여부,
        양도세취득가액: 대가,
        양수인양도부가세적용: false,
        양수인양도가액: 대가,
        취득세과표: 대가,
        시가30pct, MIN기준,
        isHigh: true,
      });
    }
  }

  // 저가도 고가도 아닌(동일) 케이스
  if (차액 === 0) {
    scenarios.length = 0; // 정상거래
    scenarios.push({ id: 0, label: '정상거래 (시가 = 대가)', badge: 'ok', isNormal: true });
  }

  return scenarios;
}

function renderScenario(s) {
  if (s.isNormal) {
    return `<div class="scenario-card">
      <div class="card-header">
        <h3>${s.label}</h3>
        <span class="badge badge-ok">정상</span>
      </div>
      <div class="card-body">
        <p style="color:var(--green); font-size:14px;">시가와 대가가 동일하여 저가/고가 양도 이슈가 없습니다.</p>
      </div>
    </div>`;
  }

  const {
    label, badge, 유형, 특수,
    시가, 대가, 차액,
    증여재산가액, 증여세과세여부,
    양도세취득가액,
    양수인양도부가세적용, 양수인양도가액,
    취득세과표,
    시가30pct, MIN기준, isHigh
  } = s;

  const badgeLabel = 유형 === '저가양도' ? '저가양도' : '고가양도';
  const 특수라벨 = 특수 ? '특수관계인 O' : '특수관계인 X';

  // 취득세 계산 (참고용)
  const 취득세5pct = 취득세과표 * 0.05;
  const MIN취득 = Math.min(취득세5pct, 300000000);

  return `
<div class="scenario-card">
  <div class="card-header">
    <h3>${label}</h3>
    <span class="badge badge-${badge}">${badgeLabel}</span>
  </div>
  <div class="card-body">

    <!-- 기본 수치 -->
    <div class="tax-section 상증세법">
      <div class="tax-section-title">📋 기본 수치</div>
      <div class="tax-row"><span class="tax-label">시가</span><span class="tax-value tax-highlight">${fmt(시가)}</span></div>
      <div class="tax-row"><span class="tax-label">대가 (양도/취득가액)</span><span class="tax-value">${fmt(대가)}</span></div>
      <div class="tax-row"><span class="tax-label">${isHigh ? '대가 - 시가' : '시가 - 대가'} (차액)</span><span class="tax-value">${fmt(차액)}</span></div>
      <div class="tax-row"><span class="tax-label">시가 × 30%</span><span class="tax-value">${fmt(시가30pct)}</span></div>
      <div class="tax-row"><span class="tax-label">MIN(시가×30%, 3억)</span><span class="tax-value">${fmt(MIN기준)}</span></div>
    </div>

    <hr class="divider">

    <!-- 상증세법 -->
    <div class="tax-section 상증세법">
      <div class="tax-section-title">💛 상증세법 — ${isHigh ? '양수인' : '양도인'}: 증여세 과세여부</div>
      <div class="tax-row">
        <span class="tax-label">시가 30%</span>
        <span class="tax-value">${fmt(시가30pct)}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">3억</span>
        <span class="tax-value">${fmt(300000000)}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">MIN(시가×30%, 3억) 초과분</span>
        <span class="tax-value">${fmt(Math.max(차액 - MIN기준, 0))}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">증여재산가액</span>
        <span class="tax-value tax-highlight">${fmt(증여재산가액)}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">증여세 과세 여부</span>
        <span class="result-tag tag-${증여세과세여부}">증여세 ${증여세과세여부}</span>
      </div>
    </div>

    <hr class="divider">

    <!-- 소득세법 -->
    <div class="tax-section 소득세법">
      <div class="tax-section-title">🔵 소득세법</div>
      ${!isHigh ? `
      <div class="tax-row">
        <span class="tax-label">양도인: 양도세 취득가액</span>
        <span class="tax-value">${fmt(양도세취득가액)}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">양수인: 양도세 부가세 적용</span>
        <span class="result-tag ${양수인양도부가세적용 ? 'tag-적용' : 'tag-해당없음'}">${양수인양도부가세적용 ? '부가세 적용' : '해당없음'}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">양수인: 추후 양도시 취득가액</span>
        <span class="tax-value tax-highlight">${fmt(양수인양도가액)}</span>
      </div>
      ` : `
      <div class="tax-row">
        <span class="tax-label">양도인: 양도가액 (부당행위계산 ${특수 ? '적용' : '미적용'})</span>
        <span class="tax-value tax-highlight">${fmt(특수 ? 시가 : 대가)}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">양수인: 부가세 적용 여부</span>
        <span class="result-tag ${양수인양도부가세적용 ? 'tag-적용' : 'tag-해당없음'}">${양수인양도부가세적용 ? '부가세 적용' : '해당없음'}</span>
      </div>
      `}
    </div>

    <hr class="divider">

    <!-- 취득세법 -->
    <div class="tax-section 취득세법">
      <div class="tax-section-title">🟢 취득세법 — 양수인: 취득세 과세표준</div>
      <div class="tax-row">
        <span class="tax-label">시가 × 5%</span>
        <span class="tax-value">${fmt(취득세5pct)}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">3억</span>
        <span class="tax-value">${fmt(300000000)}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">MIN(시가×5%, 3억)</span>
        <span class="tax-value">${fmt(MIN취득)}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">취득세 과세표준</span>
        <span class="tax-value tax-highlight">${fmt(취득세과표)}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">부가세 적용</span>
        <span class="result-tag ${특수 ? 'tag-적용' : 'tag-해당없음'}">${특수 ? '부가세 적용' : '해당없음'}</span>
      </div>
      ${특수 ? `
      <div class="tax-row">
        <span class="tax-label">유상취득분 과세표준</span>
        <span class="tax-value">${fmt(대가)}</span>
      </div>
      <div class="tax-row">
        <span class="tax-label">무상취득분 과세표준 (증여)</span>
        <span class="tax-value">${fmt(증여재산가액)}</span>
      </div>
      ` : ''}
    </div>

    ${증여세과세여부 === '있음' ? `
    <div class="notice">
      ⚠️ 증여재산가액 ${fmt(증여재산가액)} 에 대해 증여세 신고 필요<br>
      ${특수 ? '특수관계인 거래로 부당행위계산 적용 가능' : '비특수관계인이라도 차액이 기준 초과 시 증여세 과세'}
    </div>` : ''}
  </div>
</div>`;
}

function calculate() {
  const 시가 = parseVal('시가');
  const 대가 = parseVal('대가');
  const 증여재산가액 = parseVal('증여재산가액');

  if (!시가 || !대가) {
    alert('시가와 대가를 입력해주세요.');
    return;
  }

  const scenarios = calcAll(시가, 대가, 증여재산가액);
  const el = document.getElementById('결과영역');

  const 저가여부 = 시가 > 대가;
  const 고가여부 = 대가 > 시가;
  const 유형라벨 = 저가여부 ? '저가양도' : 고가여부 ? '고가양도' : '정상거래';

  el.innerHTML = `
    <div class="summary-bar">
      <div class="summary-chip"><span>시가</span><strong>${fmt(시가)}</strong></div>
      <div class="summary-chip"><span>대가</span><strong>${fmt(대가)}</strong></div>
      <div class="summary-chip"><span>유형</span><strong>${유형라벨}</strong></div>
      <div class="summary-chip"><span>차액</span><strong>${fmt(Math.abs(시가 - 대가))}</strong></div>
    </div>
    <div class="results-grid">
      ${scenarios.map(s => renderScenario(s)).join('')}
    </div>
    <div class="notice" style="margin-top:20px;">
      ※ 본 계산기는 참고용이며, 실제 세금은 세무사와 상담하시기 바랍니다.<br>
      ※ 취득세율은 주택(4%), 증여(3.5%/12%) 등 자산 종류에 따라 다를 수 있습니다.<br>
      ※ 1~3%/8%/12%/4%: 조정지역 및 기준시가 3억 이상 → 예외: 증여자가 1세대 1주택 & 배우자, 직계존비속
    </div>
  `;
}

// 엔터키 지원
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') calculate();
});
</script>
</body>
</html>
