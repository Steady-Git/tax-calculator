<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>저가양도·고가양도 세금 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #16161d;
    --card: #1c1c26;
    --border: #2a2a3a;
    --accent: #e8c87a;
    --accent2: #7ab8e8;
    --accent3: #e87a7a;
    --text: #e8e8f0;
    --text-muted: #7a7a99;
    --green: #7ae87a;
    --orange: #e8a87a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(232,200,122,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,200,122,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    max-width: 960px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  header .label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  header h1 {
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 900;
    color: var(--text);
    line-height: 1.2;
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* Input section */
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
  }

  .input-card h2 {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 20px;
  }

  .toggle-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .toggle-btn {
    flex: 1;
    min-width: 140px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }

  .toggle-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }

  .toggle-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,200,122,0.08);
  }

  .toggle-btn.active .dot {
    background: var(--accent);
  }

  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  @media (max-width: 520px) {
    .fields { grid-template-columns: 1fr; }
  }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .field label span {
    color: var(--accent);
    font-size: 10px;
    margin-left: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 50px 11px 14px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
  }

  .input-wrap .unit {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    pointer-events: none;
  }

  .preview-amount {
    font-size: 11px;
    color: var(--accent);
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
    min-height: 16px;
  }

  .calc-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0f0f13;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .calc-btn:hover {
    background: #f0d48a;
    transform: translateY(-1px);
  }

  /* Results */
  #results {
    display: none;
  }

  #results.visible {
    display: block;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .status-banner {
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.5px;
  }

  .status-banner.normal {
    background: rgba(122,232,122,0.1);
    border: 1px solid rgba(122,232,122,0.3);
    color: var(--green);
  }

  .status-banner.warning {
    background: rgba(232,168,122,0.1);
    border: 1px solid rgba(232,168,122,0.3);
    color: var(--orange);
  }

  .status-banner.danger {
    background: rgba(232,122,122,0.1);
    border: 1px solid rgba(232,122,122,0.3);
    color: var(--accent3);
  }

  .sections-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  @media (max-width: 700px) {
    .sections-grid { grid-template-columns: 1fr; }
  }

  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .section-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .section-card.sang::before { background: var(--accent); }
  .section-card.so::before { background: var(--accent2); }
  .section-card.chui::before { background: var(--accent3); }

  .section-card h3 {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-card.sang h3 { color: var(--accent); }
  .section-card.so h3 { color: var(--accent2); }
  .section-card.chui h3 { color: var(--accent3); }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 12px;
    gap: 8px;
  }

  .row .rkey {
    color: var(--text-muted);
    flex-shrink: 0;
    font-size: 11px;
  }

  .row .rval {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    text-align: right;
  }

  .row .rval.highlight {
    color: var(--accent);
    font-size: 13px;
  }

  .row .rval.blue { color: var(--accent2); }
  .row .rval.red { color: var(--accent3); }
  .row .rval.green { color: var(--green); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 10px 0;
  }

  .tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  .tag.applicable { background: rgba(232,122,122,0.15); color: var(--accent3); border: 1px solid rgba(232,122,122,0.3); }
  .tag.not-applicable { background: rgba(122,232,122,0.1); color: var(--green); border: 1px solid rgba(122,232,122,0.2); }
  .tag.none { background: rgba(122,122,153,0.15); color: var(--text-muted); border: 1px solid rgba(122,122,153,0.2); }

  .note-box {
    background: rgba(232,200,122,0.05);
    border: 1px solid rgba(232,200,122,0.15);
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.8;
  }

  .note-box strong {
    color: var(--accent);
    display: block;
    margin-bottom: 6px;
    font-size: 11px;
    letter-spacing: 1px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .note-box ul {
    padding-left: 14px;
  }

  .note-box li { margin-bottom: 4px; }

  .sep-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 12px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sep-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="label">Korean Tax Simulator</div>
    <h1>저가양도 · 고가양도<br><span>세금 계산기</span></h1>
    <p>시가와 거래가액을 입력하면 상증세법 · 소득세법 · 취득세법상 과세 여부를 자동 분석합니다</p>
  </header>

  <div class="input-card">
    <h2>⬡ 거래 정보 입력</h2>

    <div class="toggle-row">
      <button class="toggle-btn active" id="btn-special" onclick="setRelation('special')">
        <span class="dot"></span> 특수관계인 거래
      </button>
      <button class="toggle-btn" id="btn-normal" onclick="setRelation('normal')">
        <span class="dot"></span> 특수관계인 아님
      </button>
    </div>

    <div class="fields">
      <div class="field">
        <label>시가 <span>(공시가격 또는 감정가)</span></label>
        <div class="input-wrap">
          <input type="text" id="inp-siga" placeholder="예: 1150000000" oninput="formatPreview('siga')">
          <span class="unit">원</span>
        </div>
        <div class="preview-amount" id="prev-siga"></div>
      </div>
      <div class="field">
        <label>거래가액 <span>(실제 양도/취득 금액)</span></label>
        <div class="input-wrap">
          <input type="text" id="inp-deal" placeholder="예: 800000000" oninput="formatPreview('deal')">
          <span class="unit">원</span>
        </div>
        <div class="preview-amount" id="prev-deal"></div>
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()">계산하기 →</button>
  </div>

  <div id="results">
    <div id="status-banner" class="status-banner"></div>

    <div class="sep-label">세목별 분석</div>

    <div class="sections-grid">
      <!-- 상증세법 -->
      <div class="section-card sang">
        <h3>상증세법 (양도인)</h3>
        <div id="sang-content"></div>
      </div>
      <!-- 소득세법 -->
      <div class="section-card so">
        <h3>소득세법 (양수인)</h3>
        <div id="so-content"></div>
      </div>
      <!-- 취득세법 -->
      <div class="section-card chui">
        <h3>취득세법 (양수인)</h3>
        <div id="chui-content"></div>
      </div>
    </div>

    <div id="note-area"></div>
  </div>
</div>

<script>
let isSpecial = true;

function setRelation(type) {
  isSpecial = (type === 'special');
  document.getElementById('btn-special').classList.toggle('active', isSpecial);
  document.getElementById('btn-normal').classList.toggle('active', !isSpecial);
}

function parseNum(id) {
  const v = document.getElementById(id).value.replace(/,/g, '').trim();
  return parseFloat(v) || 0;
}

function formatPreview(which) {
  const id = which === 'siga' ? 'inp-siga' : 'inp-deal';
  const prevId = which === 'siga' ? 'prev-siga' : 'prev-deal';
  const val = parseFloat(document.getElementById(id).value.replace(/,/g, '')) || 0;
  document.getElementById(prevId).textContent = val > 0 ? '≈ ' + toKorean(val) : '';
}

function toKorean(n) {
  if (n === 0) return '0원';
  const units = ['', '만', '억', '조'];
  let result = '';
  const parts = [];
  let temp = Math.abs(Math.round(n));
  while (temp > 0) {
    parts.push(temp % 10000);
    temp = Math.floor(temp / 10000);
  }
  parts.reverse();
  parts.forEach((p, i) => {
    if (p > 0) result += p.toLocaleString() + units[parts.length - 1 - i] + ' ';
  });
  return result.trim() + '원';
}

function fmt(n) {
  return Math.round(n).toLocaleString() + '원';
}

function row(key, val, cls='') {
  return `<div class="row"><span class="rkey">${key}</span><span class="rval ${cls}">${val}</span></div>`;
}

function tag(applicable) {
  if (applicable === true) return '<span class="tag applicable">적용</span>';
  if (applicable === false) return '<span class="tag not-applicable">해당없음</span>';
  return '<span class="tag none">-</span>';
}

function calculate() {
  const siga = parseNum('inp-siga');
  const deal = parseNum('inp-deal');

  if (!siga || !deal) {
    alert('시가와 거래가액을 입력해주세요.');
    return;
  }

  const diff = deal - siga; // 양수 = 고가양도(양도인 기준), 음수 = 저가양도
  const isLow = deal < siga;  // 저가양도 (양도인이 싸게 팜)
  const isHigh = deal > siga; // 고가양도 (양도인이 비싸게 팜)
  const absDiff = Math.abs(diff);
  const pct = siga > 0 ? (absDiff / siga) : 0;

  // ===== 상증세법 (양도인 기준) =====
  // 저가양도: 양도인이 저가로 판 경우 → 양수인에게 증여 문제
  // 고가양도: 양도인이 고가로 판 경우 → 양도인이 이득 → 양수인에게 증여 문제
  // 실제로 상증세법상: 저가양도 시 양수인이 이익, 고가양도 시 양도인이 이익
  // 증여재산가액 판단은 양수인/양도인 각각

  const 삼억기준 = 300000000;
  const 시가30pct = siga * 0.3;
  const minVal = Math.min(삼억기준, 시가30pct);

  // 상증세 과세 여부
  let sangGift = 0;
  let sangApplicable = false;

  if (isSpecial) {
    // 특수관계인: 시가와 대가 차이가 있으면 과세 (단, Min(시가×30%, 3억) 초과 여부)
    if (absDiff > minVal) {
      sangApplicable = true;
      sangGift = absDiff; // 전액이 증여재산가액 (차액 전부)
      // 실제: 증여재산가액 = 대가 - (시가 - Min(시가×30%,3억)) 또는 (시가 + Min(시가×30%,3억)) - 대가
      // 저가: 증여재산가액 = 시가 - 대가 - min(시가×30%,3억) ... 아니면 차액 자체
      // 책 내용에 따르면: 증여이익 = 시가 - 대가 (저가양도시 양수인 이익)
      // 과세요건: 시가와 대가 차이 > Min(시가×30%, 3억)
      sangGift = absDiff; // 차액 전체가 증여재산가액
    }
  } else {
    // 비특수관계인: Min(시가×30%, 3억) 초과 + 시가 기준 30% 차이
    if (absDiff > minVal && pct >= 0.3) {
      sangApplicable = true;
      sangGift = absDiff;
    }
  }

  // ===== 소득세법 =====
  // 저가양도: 양도인의 양도가액 = 실제 거래가 (원칙), 하지만 특수관계인 저가양도는 시가로 재계산 가능
  // 고가양도: 양수인의 취득가액 = 시가
  // 부당행위계산: 특수관계인 + 시가 대비 5% or 3억 이상 차이

  const 오pct기준 = siga * 0.05;
  const 소득세부당 = absDiff >= Math.min(오pct기준, 삼억기준);

  let soApplicable = false;
  let soTaxBase = 0;
  let soAcquisition = deal;

  if (isSpecial && 소득세부당) {
    soApplicable = true;
    // 저가양도: 양도인 양도가액을 시가로 보아 양도소득 계산
    // 고가양도: 양수인 취득가액은 시가로 함
    if (isLow) {
      soTaxBase = siga; // 양도인 양도가액 = 시가
    } else {
      soAcquisition = siga; // 양수인 취득가액 = 시가
    }
  }

  // 취득세
  // 저가취득: 양수인이 시가보다 싸게 취득 → 취득세 과세표준 = 시가
  // 고가취득: 양수인이 시가보다 비싸게 취득 → 취득세 과세표준 = 실제 취득가 (고가가 과세표준)
  // 부당행위: 특수관계인 + 시가 기준 5% or 3억
  const 취득세율_유상 = 0.04; // 4% 기준 (실제는 물건에 따라 다름)
  let chuiBase = 0;
  let chuiApplicable = false;

  if (isSpecial && 소득세부당) {
    chuiApplicable = true;
    if (isLow) {
      chuiBase = siga; // 저가취득시 시가로 과세
    } else {
      chuiBase = deal; // 고가취득시 실제가로 과세
    }
  } else {
    chuiBase = isHigh ? deal : siga; // 기본: max(시가, 거래가)
    chuiApplicable = false;
  }

  // === 렌더링 ===
  const results = document.getElementById('results');
  results.classList.add('visible');

  // 상태 배너
  const banner = document.getElementById('status-banner');
  let bannerClass, bannerText;
  if (!isLow && !isHigh) {
    bannerClass = 'normal';
    bannerText = '✓ 시가 = 거래가액 — 정상 거래';
  } else if (isLow) {
    const diff_label = `시가 대비 ${(pct*100).toFixed(1)}% (${fmt(absDiff)}) 저가양도`;
    if (sangApplicable) {
      bannerClass = 'danger';
      bannerText = `⚠ 저가양도 — ${diff_label} — 증여세 과세 요건 해당`;
    } else {
      bannerClass = 'warning';
      bannerText = `△ 저가양도 — ${diff_label} — 과세 요건 미달`;
    }
  } else {
    const diff_label = `시가 대비 ${(pct*100).toFixed(1)}% (${fmt(absDiff)}) 고가양도`;
    if (sangApplicable) {
      bannerClass = 'danger';
      bannerText = `⚠ 고가양도 — ${diff_label} — 증여세 과세 요건 해당`;
    } else {
      bannerClass = 'warning';
      bannerText = `△ 고가양도 — ${diff_label} — 과세 요건 미달`;
    }
  }
  banner.className = `status-banner ${bannerClass}`;
  banner.textContent = bannerText;

  // 상증세법 카드
  let sangHTML = '';
  sangHTML += row('시가 × 30%', fmt(시가30pct));
  sangHTML += row('3억 기준선', fmt(삼억기준));
  sangHTML += row('Min(시가×30%, 3억)', fmt(minVal), 'blue');
  sangHTML += '<hr class="divider">';
  sangHTML += row('시가와 거래가 차액', fmt(absDiff), absDiff > minVal ? 'red' : 'green');
  sangHTML += row('과세 요건 (차액 > Min값)', absDiff > minVal ? '초과' : '미달', absDiff > minVal ? 'red' : 'green');
  if (!isSpecial) {
    sangHTML += row('30% 차이 요건', pct >= 0.3 ? '충족' : '미충족', pct >= 0.3 ? 'red' : 'green');
  }
  sangHTML += '<hr class="divider">';
  sangHTML += `<div class="row"><span class="rkey">증여세 부과</span>${tag(sangApplicable)}</div>`;
  if (sangApplicable) {
    sangHTML += row('증여재산가액', fmt(sangGift), 'red highlight');
    sangHTML += `<div style="font-size:11px; color:var(--text-muted); margin-top:6px;">
      ${isLow ? '양수인' : '양도인'}에게 증여세 부과
    </div>`;
  }
  document.getElementById('sang-content').innerHTML = sangHTML;

  // 소득세법 카드
  let soHTML = '';
  soHTML += row('시가 × 5%', fmt(오pct기준));
  soHTML += row('Min(시가×5%, 3억)', fmt(Math.min(오pct기준, 삼억기준)), 'blue');
  soHTML += row('차액', fmt(absDiff));
  soHTML += '<hr class="divider">';

  if (isLow) {
    soHTML += `<div class="row"><span class="rkey">부당행위계산 적용</span>${tag(soApplicable)}</div>`;
    if (soApplicable) {
      soHTML += row('양도인 양도가액', fmt(siga), 'red highlight');
      soHTML += `<div style="font-size:11px; color:var(--text-muted); margin-top:6px;">
        양도인의 양도가액을 시가(${fmt(siga)})로 보아 양도소득세 계산
      </div>`;
    } else {
      soHTML += row('양도인 양도가액', fmt(deal), 'green');
      soHTML += `<div style="font-size:11px; color:var(--text-muted); margin-top:6px;">실제 거래가액으로 양도소득세 계산</div>`;
    }
  } else if (isHigh) {
    soHTML += `<div class="row"><span class="rkey">양수인 취득가액</span>`;
    if (soApplicable) {
      soHTML += `</div>`;
      soHTML += row('취득가액 (시가 적용)', fmt(siga), 'red highlight');
      soHTML += `<div style="font-size:11px; color:var(--text-muted); margin-top:6px;">
        양수인의 취득가액을 시가(${fmt(siga)})로 함 → 향후 양도시 양도차익 증가
      </div>`;
    } else {
      soHTML += `</div>`;
      soHTML += row('취득가액 (실제가 적용)', fmt(deal), 'green');
    }
    soHTML += `<div class="row"><span class="rkey">부당행위계산</span>${tag(soApplicable)}</div>`;
  } else {
    soHTML += row('양도가액', fmt(deal), 'green');
    soHTML += `<div class="row"><span class="rkey">부당행위계산</span>${tag(false)}</div>`;
  }

  document.getElementById('so-content').innerHTML = soHTML;

  // 취득세법 카드
  let chuiHTML = '';
  const 취득세 = chuiBase * 취득세율_유상;
  chuiHTML += row('실제 취득가', fmt(deal));
  chuiHTML += row('시가', fmt(siga));
  chuiHTML += '<hr class="divider">';
  chuiHTML += `<div class="row"><span class="rkey">부당행위 적용</span>${tag(chuiApplicable)}</div>`;
  chuiHTML += row('과세표준', fmt(chuiBase), chuiApplicable && isLow ? 'red highlight' : 'highlight');

  if (chuiApplicable && isLow) {
    chuiHTML += `<div style="font-size:11px; color:var(--text-muted); margin-top:6px;">
      저가취득 → 과세표준을 시가(${fmt(siga)})로 적용
    </div>`;
  } else if (!chuiApplicable) {
    chuiHTML += `<div style="font-size:11px; color:var(--text-muted); margin-top:6px;">
      실제 거래가액으로 취득세 계산
    </div>`;
  }

  chuiHTML += '<hr class="divider">';
  chuiHTML += `<div class="row"><span class="rkey" style="font-size:10px">참고: 취득세(4% 기준)</span><span class="rval" style="font-size:11px">${fmt(취득세)}</span></div>`;
  chuiHTML += `<div style="font-size:10px; color:var(--text-muted); margin-top:4px;">※ 실제 세율은 물건 종류에 따라 상이</div>`;

  document.getElementById('chui-content').innerHTML = chuiHTML;

  // 비고
  let noteHTML = `<div class="note-box">
    <strong>⬡ 참고사항</strong>
    <ul>`;

  if (isSpecial) {
    noteHTML += `<li>특수관계인 거래 기준 적용 (상증세법 §35, 소득세법 §101, 지방세법 §10)</li>`;
    noteHTML += `<li>상증세 과세요건: 시가와 대가 차이 > Min(시가×30%, 3억원)</li>`;
    noteHTML += `<li>소득세 부당행위: 시가와 대가 차이 ≥ Min(시가×5%, 3억원)</li>`;
  } else {
    noteHTML += `<li>비특수관계인 거래 기준 적용</li>`;
    noteHTML += `<li>상증세 과세요건: 차액 > Min(시가×30%, 3억) <strong>AND</strong> 시가 대비 30% 이상 차이</li>`;
    noteHTML += `<li>소득세 부당행위계산: 특수관계인 간에만 적용 → 해당없음</li>`;
  }

  noteHTML += `<li>취득세율 4%는 유상취득 기본세율 기준이며 실제는 물건 종류(주택, 토지 등)에 따라 다름</li>`;
  noteHTML += `<li>본 계산기는 참고용이며 실제 세무 판단은 전문가와 상담하세요.</li>`;
  noteHTML += `</ul></div>`;

  document.getElementById('note-area').innerHTML = noteHTML;

  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
