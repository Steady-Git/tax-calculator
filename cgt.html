<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>양도소득세 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fdfaf5;
    --surface2: #f0ebe0;
    --border: #c8b99a;
    --border-light: #e0d5c0;
    --ink: #1a1410;
    --ink-soft: #5a4e3c;
    --accent: #8b1a1a;
    --accent-light: #c0392b;
    --gold: #b8960c;
    --positive: #1a5c2a;
    --negative: #8b1a1a;
    --label-w: 160px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  /* Subtle ledger-paper background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      transparent,
      transparent 31px,
      rgba(184,150,12,0.08) 31px,
      rgba(184,150,12,0.08) 32px
    );
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 2px solid var(--border);
  }

  .header-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-family: 'Noto Serif KR', serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    padding: 4px 14px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 1px;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 2px 3px 0 rgba(0,0,0,0.06);
  }

  .card-header {
    background: var(--ink);
    color: #f5f0e8;
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-header .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    background: var(--gold);
    color: var(--ink);
    font-size: 11px;
    font-weight: 700;
    border-radius: 50%;
  }

  .card-body {
    padding: 0;
  }

  /* Row */
  .row {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border-light);
    min-height: 44px;
  }

  .row:last-child {
    border-bottom: none;
  }

  .row.subtotal {
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }

  .row label {
    width: var(--label-w);
    min-width: var(--label-w);
    padding: 8px 18px;
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 400;
    border-right: 1px solid var(--border-light);
  }

  .row.subtotal label {
    font-weight: 700;
    color: var(--ink);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
  }

  .row input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 8px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--ink);
    text-align: right;
    outline: none;
    transition: background 0.15s;
  }

  .row input:focus {
    background: rgba(184,150,12,0.06);
  }

  .row input[type="date"] {
    text-align: left;
    cursor: pointer;
  }

  .row .display-val {
    flex: 1;
    padding: 8px 16px;
    text-align: right;
    font-size: 13px;
    color: var(--ink);
  }

  .row.subtotal .display-val {
    font-weight: 700;
    font-size: 14px;
  }

  /* Result section */
  .result-card {
    background: var(--ink);
    border: 1px solid var(--ink);
    margin-bottom: 16px;
    box-shadow: 4px 5px 0 rgba(0,0,0,0.15);
  }

  .result-card .card-header {
    background: var(--gold);
    color: var(--ink);
  }

  .result-card .row {
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .result-card .row label {
    color: rgba(245,240,232,0.7);
    border-right-color: rgba(255,255,255,0.08);
    font-size: 13px;
  }

  .result-card .row.subtotal {
    background: rgba(255,255,255,0.05);
    border-top-color: rgba(255,255,255,0.15);
  }

  .result-card .row.subtotal label {
    color: #f5f0e8;
  }

  .result-card .display-val {
    color: #f5f0e8;
  }

  .result-card .row.subtotal .display-val {
    color: #f5f0e8;
  }

  /* Final total */
  .total-box {
    background: var(--accent);
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 4px 5px 0 rgba(139,26,26,0.3);
  }

  .total-label {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }

  .total-amount {
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 700;
    color: #ffe;
    letter-spacing: -1px;
  }

  /* Negative values */
  .neg { color: var(--negative) !important; }
  .result-card .neg { color: #ff8080 !important; }

  /* Tax rate badge */
  .rate-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--ink);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    margin-left: 8px;
    border-radius: 2px;
  }

  /* Period display */
  .period-display {
    font-size: 12px;
    color: var(--gold);
    padding-right: 16px;
    flex-shrink: 0;
  }

  .result-card .period-display { color: #f0d060; }

  /* Separator row */
  .sep-row {
    height: 1px;
    background: var(--border);
  }

  /* Info note */
  .info-note {
    font-size: 11px;
    color: var(--ink-soft);
    padding: 12px 18px;
    border-top: 1px solid var(--border-light);
    line-height: 1.7;
    background: var(--surface2);
  }

  /* Reset button */
  .reset-btn {
    display: block;
    margin: 24px auto 0;
    padding: 12px 36px;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--ink-soft);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
    background: var(--surface2);
  }

  /* Section: 양도일자/취득일자 */
  .date-section .row label {
    font-weight: 500;
    color: var(--ink);
  }

  @media (max-width: 480px) {
    :root { --label-w: 120px; }
    h1 { font-size: 24px; }
    .total-amount { font-size: 20px; }
    .total-label { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-badge">Real Estate Tax Calculator</div>
    <h1>양도소득세 계산기</h1>
    <p class="subtitle">부동산 양도차익 및 납부세액 자동 산출</p>
  </header>

  <!-- 양도가액 -->
  <div class="card">
    <div class="card-header"><span class="num">1</span> 양도가액</div>
    <div class="card-body">
      <div class="row">
        <label>양도가액</label>
        <input type="text" id="salePrice" placeholder="0" oninput="handleInput(this)" />
      </div>
    </div>
  </div>

  <!-- 취득가액 -->
  <div class="card">
    <div class="card-header"><span class="num">2</span> 취득가액</div>
    <div class="card-body">
      <div class="row"><label>매입가액</label><input type="text" id="purchasePrice" placeholder="0" oninput="handleInput(this)" /></div>
      <div class="row"><label>취득세</label><input type="text" id="acquisitionTax" placeholder="0" oninput="handleInput(this)" /></div>
      <div class="row"><label>등록세</label><input type="text" id="registrationTax" placeholder="0" oninput="handleInput(this)" /></div>
      <div class="row"><label>법무사</label><input type="text" id="legalFee" placeholder="0" oninput="handleInput(this)" /></div>
      <div class="row"><label>중개수수료</label><input type="text" id="brokerFeeAcq" placeholder="0" oninput="handleInput(this)" /></div>
      <div class="row"><label>감가상각비</label><input type="text" id="depreciation" placeholder="0" oninput="handleInput(this)" /></div>
      <div class="row subtotal">
        <label>취득가액 합계</label>
        <div class="display-val" id="totalAcqCost">0</div>
      </div>
    </div>
  </div>

  <!-- 필요경비 -->
  <div class="card">
    <div class="card-header"><span class="num">3</span> 필요경비</div>
    <div class="card-body">
      <div class="row"><label>자본적지출</label><input type="text" id="capitalExp" placeholder="0" oninput="handleInput(this)" /></div>
      <div class="row"><label>중개수수료</label><input type="text" id="brokerFeeSale" placeholder="0" oninput="handleInput(this)" /></div>
      <div class="row"><label>양도세 수수료</label><input type="text" id="transferFee" placeholder="0" oninput="handleInput(this)" /></div>
      <div class="row subtotal">
        <label>필요경비 합계</label>
        <div class="display-val" id="totalExpense">0</div>
      </div>
    </div>
  </div>

  <!-- 보유기간 -->
  <div class="card date-section">
    <div class="card-header"><span class="num">4</span> 보유기간 및 장기보유특별공제</div>
    <div class="card-body">
      <div class="row">
        <label>취득일자</label>
        <input type="date" id="acquireDate" oninput="calculate()" />
      </div>
      <div class="row">
        <label>양도일자</label>
        <input type="date" id="saleDate" oninput="calculate()" />
        <div class="period-display" id="holdPeriodDisplay"></div>
      </div>
      <div class="row subtotal">
        <label>장기보유공제율</label>
        <div class="display-val" id="lthdRateDisplay">–</div>
      </div>
    </div>
    <div class="info-note">
      * 장기보유특별공제: 3년 이상 보유 시 적용 (3년~15년 이상, 연 2%, 최대 30%)<br>
      * 1세대 1주택: 2년 이상 거주 시 추가 공제 (연 4%, 최대 80%) — 본 계산기는 일반공제 기준 적용
    </div>
  </div>

  <!-- 계산 결과 -->
  <div class="result-card card">
    <div class="card-header"><span class="num">★</span> 세액 산출 결과</div>
    <div class="card-body">
      <div class="row"><label>양도차익</label><div class="display-val" id="gainDisplay">0</div></div>
      <div class="row"><label>장기보유공제액</label><div class="display-val" id="lthdAmtDisplay">0</div></div>
      <div class="row subtotal"><label>양도소득금액</label><div class="display-val" id="incomeDisplay">0</div></div>
      <div class="row"><label>기본공제</label><div class="display-val">2,500,000</div></div>
      <div class="row subtotal"><label>과세표준</label><div class="display-val" id="taxBaseDisplay">0</div></div>
      <div class="row">
        <label>세율</label>
        <div class="display-val" id="taxRateDisplay">–</div>
      </div>
      <div class="row"><label>누진공제액</label><div class="display-val" id="progressDeductDisplay">–</div></div>
      <div class="row subtotal"><label>산출세액</label><div class="display-val" id="taxAmtDisplay">0</div></div>
      <div class="row"><label>지방소득세 (10%)</label><div class="display-val" id="localTaxDisplay">0</div></div>
    </div>
  </div>

  <!-- 합계 -->
  <div class="total-box">
    <div class="total-label">납부세액 합계</div>
    <div class="total-amount" id="totalTaxDisplay">0 원</div>
  </div>

  <button class="reset-btn" onclick="resetAll()">초기화</button>

</div>

<script>
// ─── 포맷 유틸 ─────────────────────────────────────────────
function fmt(n) {
  if (!n && n !== 0) return '–';
  return Math.round(n).toLocaleString('ko-KR');
}

function parseVal(id) {
  const el = document.getElementById(id);
  if (!el) return 0;
  const raw = el.value.replace(/,/g, '');
  return parseFloat(raw) || 0;
}

function handleInput(el) {
  const raw = el.value.replace(/,/g, '').replace(/[^0-9.-]/g, '');
  const num = parseFloat(raw);
  if (!isNaN(num)) {
    const parts = raw.split('.');
    parts[0] = parseInt(parts[0]).toLocaleString('ko-KR');
    el.value = parts.join('.');
  } else {
    el.value = '';
  }
  calculate();
}

function setDisplay(id, value, isNeg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = fmt(value);
  el.classList.toggle('neg', !!isNeg);
}

// ─── 세율표 ────────────────────────────────────────────────
const TAX_BRACKETS = [
  { limit: 14_000_000,  rate: 0.06, deduct: 0 },
  { limit: 50_000_000,  rate: 0.15, deduct: 1_260_000 },
  { limit: 88_000_000,  rate: 0.24, deduct: 5_760_000 },
  { limit: 150_000_000, rate: 0.35, deduct: 15_440_000 },
  { limit: 300_000_000, rate: 0.38, deduct: 19_940_000 },
  { limit: 500_000_000, rate: 0.40, deduct: 25_940_000 },
  { limit: 1_000_000_000, rate: 0.42, deduct: 35_940_000 },
  { limit: Infinity,    rate: 0.45, deduct: 65_940_000 },
];

function getTaxInfo(taxBase) {
  if (taxBase <= 0) return { rate: 0, deduct: 0 };
  for (const b of TAX_BRACKETS) {
    if (taxBase <= b.limit) return { rate: b.rate, deduct: b.deduct };
  }
  return { rate: 0.45, deduct: 65_940_000 };
}

// ─── 장기보유특별공제율 (일반, 연 2%, 최대 30%, 3년 이상) ──
function getLthdRate(years) {
  if (years < 3) return 0;
  const rate = Math.min(years * 0.02, 0.30);
  return rate;
}

// ─── 보유기간 계산 ──────────────────────────────────────────
function calcYears(acquireStr, saleStr) {
  if (!acquireStr || !saleStr) return null;
  const a = new Date(acquireStr);
  const s = new Date(saleStr);
  if (isNaN(a) || isNaN(s) || s < a) return null;
  let years = s.getFullYear() - a.getFullYear();
  let months = s.getMonth() - a.getMonth();
  let days = s.getDate() - a.getDate();
  if (days < 0) months--;
  if (months < 0) { years--; months += 12; }
  // fractional year for display but integer-floor for rate
  return { years, months };
}

// ─── 메인 계산 ─────────────────────────────────────────────
function calculate() {
  // 취득가액 합계
  const acqCost = parseVal('purchasePrice') + parseVal('acquisitionTax') +
    parseVal('registrationTax') + parseVal('legalFee') +
    parseVal('brokerFeeAcq') + parseVal('depreciation');
  setDisplay('totalAcqCost', acqCost);

  // 필요경비 합계
  const expense = parseVal('capitalExp') + parseVal('brokerFeeSale') + parseVal('transferFee');
  setDisplay('totalExpense', expense);

  // 양도차익
  const salePrice = parseVal('salePrice');
  const gain = salePrice - acqCost - expense;
  setDisplay('gainDisplay', gain, gain < 0);

  // 보유기간
  const acquireStr = document.getElementById('acquireDate').value;
  const saleStr = document.getElementById('saleDate').value;
  const period = calcYears(acquireStr, saleStr);

  let holdYears = 0;
  if (period) {
    holdYears = period.years;
    const pStr = `${period.years}년 ${period.months}개월`;
    document.getElementById('holdPeriodDisplay').textContent = pStr;
  } else {
    document.getElementById('holdPeriodDisplay').textContent = '';
  }

  // 장기보유특별공제
  const lthdRate = getLthdRate(holdYears);
  const lthdAmt = gain > 0 ? Math.floor(gain * lthdRate) : 0;
  const lthdPct = (lthdRate * 100).toFixed(0) + '%';
  document.getElementById('lthdRateDisplay').textContent = lthdRate > 0 ? lthdPct : '해당없음 (3년 미만)';
  setDisplay('lthdAmtDisplay', lthdAmt);

  // 양도소득금액
  const income = gain - lthdAmt;
  setDisplay('incomeDisplay', income, income < 0);

  // 기본공제
  const basicDeduct = 2_500_000;

  // 과세표준
  const taxBase = Math.max(income - basicDeduct, 0);
  setDisplay('taxBaseDisplay', taxBase, taxBase < 0);

  // 세율 & 누진공제
  const { rate, deduct } = getTaxInfo(taxBase);
  document.getElementById('taxRateDisplay').textContent =
    taxBase > 0 ? (rate * 100).toFixed(0) + '%' : '–';
  document.getElementById('progressDeductDisplay').textContent =
    taxBase > 0 ? fmt(deduct) : '–';

  // 산출세액
  const taxAmt = taxBase > 0 ? Math.round(taxBase * rate - deduct) : 0;
  setDisplay('taxAmtDisplay', taxAmt, taxAmt < 0);

  // 지방소득세
  const localTax = taxAmt > 0 ? Math.round(taxAmt * 0.1) : 0;
  setDisplay('localTaxDisplay', localTax, localTax < 0);

  // 합계
  const total = taxAmt + localTax;
  const totalEl = document.getElementById('totalTaxDisplay');
  totalEl.textContent = fmt(total) + ' 원';
  totalEl.classList.toggle('neg', total < 0);
}

function resetAll() {
  document.querySelectorAll('input').forEach(el => el.value = '');
  document.querySelectorAll('.display-val').forEach(el => {
    el.textContent = '0';
    el.classList.remove('neg');
  });
  document.getElementById('lthdRateDisplay').textContent = '–';
  document.getElementById('taxRateDisplay').textContent = '–';
  document.getElementById('progressDeductDisplay').textContent = '–';
  document.getElementById('holdPeriodDisplay').textContent = '';
  document.getElementById('totalTaxDisplay').textContent = '0 원';
}
</script>
</body>
</html>
